name: tdx-dev

services:
  tdx:
    # Published by CI to GHCR (.github/workflows/docker.yml). The host pulls this
    # image (docker compose pull && up); Watchtower auto-updates it (compose.watchtower.yml).
    image: ghcr.io/nebulous-code/tdx:latest
    # build: is kept for local dev only — `docker compose up -d --build` rebuilds
    # and tags the image above. The host never passes --build, so it uses the pulled image.
    build:
      context: .
      # D1 TypeScript server (serves the API + the static frontend).
      # ⚠️ Before this image goes live, the prod /data/tdx.db must be converted to
      # the new UUID schema — the server will not start against the legacy DB.
      # See docs/DEPLOY.md for the ordered cutover (migrate first, then push).
      dockerfile: server/Dockerfile
    restart: unless-stopped
    labels:
      # let the Watchtower instance auto-update this container
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - DB_PATH=/data/tdx.db
      # Set to your local timezone so created/completed date stamps are local.
      - TZ=America/New_York
      # Cookie-signing secret, substituted from the repo-root .env (gitignored).
      # Compose errors out if it's unset, so deploys can't run without it.
      - SESSION_SECRET=${SESSION_SECRET:?set SESSION_SECRET in the repo-root .env}
    volumes:
      - ./data:/data            # SQLite file persists across rebuilds
      # Scheduled backups land here (admin → account → backups in the UI). Point the
      # HOST side at a durable, offsite-replicated location — e.g. a ZFS dataset:
      #   - /tank/backups/tdx:/backups
      # The UI's "directory" must match the CONTAINER side (default /backups). See
      # docs/BACKUP_DESIGN.md.
      - ./backups:/backups
    ports:
      # Published on all interfaces — reach it at http://<host-ip>:3000 over the
      # LAN or tailnet. Restrict to "127.0.0.1:3000:3000" if you front it yourself.
      - "3000:3000"
