name: build-image

# Run BOTH test suites — server and frontend — on every push to ANY branch and on every PR.
# Only after both pass do we build the app image and push it to GHCR (on main pushes only).
# The image is consumed by compose.yaml (ghcr.io/nebulous-code/tdx:latest); a
# Watchtower instance on the host auto-pulls new :latest images (see compose.watchtower.yml).
# Because Watchtower auto-deploys :latest, the test gate below is what stops a broken
# commit from reaching prod.
#
# Why every branch, not just main + PRs: a broken test should surface on the push that broke
# it, not weeks later at merge time. `store.searchRoots` was deleted in da7dac6 (2026-06-30)
# and its test stayed red until someone happened to run the suite locally — because feature
# branches never ran CI and the frontend suite never ran AT ALL.
on:
  push:
    branches: ['**']
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install deps
        working-directory: server
        run: npm ci

      - name: Typecheck
        working-directory: server
        run: npm run typecheck

      - name: Lint
        working-directory: server
        run: npm run lint

      # Runs the suite WITH coverage and fails if lines/branches/functions drop below the
      # floors in tools/coverage-floor.txt (lines 95 / branches 94 / functions 95). Same
      # script you run locally: `tools/test_coverage.sh` (use --bump to ratchet floors up).
      - name: Test + coverage gate
        run: bash tools/test_coverage.sh

  # The frontend is a NO-BUILD Vue app (window globals, script tags) with zero dependencies —
  # the golden suite runs on a bare Node with node:test, no install, no jsdom, no bundler.
  # It is not optional: the creation language (frontend/js/create.js) and the query/recurrence
  # engines are frontend-ONLY, and they ship inside the same image the server does.
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Same script you run locally: `tools/test_coverage_frontend.sh` (use --bump to ratchet
      # the floors up). Fails if lines/branches/functions drop below tools/coverage-floor-frontend.txt.
      - name: Test + coverage gate
        run: bash tools/test_coverage_frontend.sh

  # Playwright smokes: boot the real app (server serving the built frontend) against a
  # throwaway seeded DB/vault and drive chromium through the critical paths. Baked into
  # the same image, so it gates the build alongside the unit suites.
  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: server

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
        working-directory: server

      - name: e2e smokes
        run: npx playwright test
        working-directory: server

  build-push:
    # BOTH suites gate the image — the frontend is baked into it (the Dockerfile COPYs
    # server/ + frontend/), so a green server suite alone is not evidence the app works.
    needs: [test-server, test-frontend, test-e2e]
    # only build + publish on a real push to main — never on PRs (Watchtower would deploy it)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          # build context is the repo ROOT (the Dockerfile COPYs server/ + frontend/).
          # ⚠️ Pushing this builds + publishes the D1 server image, which Watchtower
          # auto-deploys. Do NOT merge to main until prod /data/tdx.db has been
          # converted to the new UUID schema — see docs/DEPLOY.md.
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/nebulous-code/tdx:latest
            ghcr.io/nebulous-code/tdx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
