name: build-image

# Run the server test suite on every PR and on pushes to main; only after it
# passes do we build the app image and push it to GHCR (on main pushes only).
# The image is consumed by compose.yaml (ghcr.io/nebulous-code/tdx:latest); a
# Watchtower instance on the host auto-pulls new :latest images (see compose.watchtower.yml).
# Because Watchtower auto-deploys :latest, the test gate below is what stops a broken
# commit from reaching prod.
on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install deps
        working-directory: server
        run: npm ci

      - name: Typecheck
        working-directory: server
        run: npm run typecheck

      - name: Lint
        working-directory: server
        run: npm run lint

      # Runs the suite WITH coverage and fails if line coverage drops below the floor
      # in tools/coverage-floor.txt (currently 95%). Same script you run locally:
      # `tools/test_coverage.sh` (use --bump locally to ratchet the floor up).
      - name: Test + coverage gate
        run: bash tools/test_coverage.sh

  build-push:
    needs: test
    # only build + publish on a real push to main — never on PRs (Watchtower would deploy it)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          # build context is the repo ROOT (the Dockerfile COPYs server/ + frontend/).
          # ⚠️ Pushing this builds + publishes the D1 server image, which Watchtower
          # auto-deploys. Do NOT merge to main until prod /data/tdx.db has been
          # converted to the new UUID schema — see docs/DEPLOY.md.
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/nebulous-code/tdx:latest
            ghcr.io/nebulous-code/tdx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
