name: build-image

# Build the app image and push it to GHCR on every push to main.
# The image is consumed by compose.yaml (ghcr.io/nebulous-code/tdx:latest); a
# Watchtower instance on the host auto-pulls new :latest images (see compose.watchtower.yml).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          # build context is the repo ROOT (the Dockerfile COPYs backend/ frontend/ tools/)
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/nebulous-code/tdx:latest
            ghcr.io/nebulous-code/tdx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
