<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>tdx // terminal todo</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="themes.css" />
<link rel="icon" href="/icons/icon-192.png?v=3" />
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=3" />
<meta name="theme-color" content="#0b0a07" />
<!-- iOS "Add to Home Screen": classic apple-touch-icon path (the >_ tile) + standalone.
     NO web manifest on purpose — with a manifest iOS enters "web app" mode and pulls the
     home-screen icon from the manifest, which it was failing to load (white letter tile).
     The apple-touch-icon path is the one proven to render the orange >_. ?v= busts iOS's
     sticky icon cache. A copy is also served at the site root for iOS auto-discovery. -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="tdx" />
</head>
<body>
<div class="crt-vignette"></div>
<div class="crt-scanlines"></div>
<div class="crt-flicker"></div>

<div id="app">
  <!-- auth gate: the whole app shell only renders once authenticated -->
  <login-screen v-if="!store.currentUser" @authed="onAuthed"></login-screen>
  <div v-else class="shell" :class="{ 'detail-open': store.detailOpen, 'nav-collapsed': store.navCollapsed }">

    <!-- top bar -->
    <header class="topbar">
      <span class="mobile-only qbtn" style="padding:1px 7px;" @click="store.sidebarOpen=!store.sidebarOpen">≡</span>
      <span class="brand">tdx<b>_</b></span>
      <span class="sep">│</span>
      <span class="mut nowrap">{{ clock }} {{ today }}</span>
      <div class="right">
        <span class="dim">{{ openCount }} open</span>
        <span class="sep">│</span>
        <span class="dim">{{ overdueCount }} overdue</span>
        <span class="sep">│</span>
        <span class="qbtn" @click="openAccount" title="account (@)">{{ store.currentUser && store.currentUser.username }}</span>
      </div>
    </header>

    <!-- sidebar -->
    <app-sidebar :store="store"
      @new-query="openSave(store.view.query||'')"
      @edit-query="openViewEdit"
      @delete-query="deleteView"
      @new-project="openProjectModal('new', $event)"
      @edit-project="openProjectModal('edit', null, $event)"
      @edit-label="openLabelEdit"></app-sidebar>
    <div class="scrim" :class="{ show: store.sidebarOpen }" @click="store.sidebarOpen=false"></div>

    <!-- main -->
    <main class="main">
      <query-bar ref="qbar" :store="store" @save-query="openSave"></query-bar>
      <div class="view-title" style="display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid var(--line);background:var(--bg);">
        <span class="hi" style="font-family:var(--crt);font-size:18px;line-height:1;">{{ store.view.title }}</span>
        <span class="mut" style="font-size:11px;" v-if="store.currentQuery()">› {{ store.currentQuery() }}</span>
      </div>
      <task-list ref="list" :store="store"></task-list>
      <task-detail ref="detail" :store="store"></task-detail>
    </main>

    <!-- status bar -->
    <footer class="statusbar">
      <template v-if="store.searchActive">
        <span class="search-prompt">/</span>
        <input ref="search" class="searchbar" v-model="store.searchTerm" spellcheck="false"
               placeholder="search title + notes…"
               @keydown.enter.stop.prevent="commitSearch" @keydown.esc.stop.prevent="commitSearch" />
        <span class="mut">{{ store.visibleRoots().length }} match{{ store.visibleRoots().length===1?'':'es' }}</span>
      </template>
      <template v-else>
        <span><span class="spark">●</span> READY</span>
        <span class="sep">│</span>
        <span class="mut">{{ store.visibleRoots().length }} rows</span>
      </template>
      <div class="right">
        <span class="qbtn" @click="helpOpen=true" title="keyboard shortcuts & query syntax">? help</span>
        <span class="qbtn" @click="openPalette" title="command palette">⌘K</span>
        <span class="mut">v1.0</span>
      </div>
    </footer>
  </div>

  <!-- command palette -->
  <command-palette :store="store" :open="paletteOpen"
    @close="paletteOpen=false"
    @new-task="newTask"
    @new-project="openProjectModal('new', $event)"
    @save-query="openSave"></command-palette>

  <!-- modals -->
  <project-modal v-if="projectModal" :store="store" :model="projectModal" @close="projectModal=null"></project-modal>
  <save-query-modal v-if="saveModal" :store="store" :model="saveModal" @close="saveModal=null"></save-query-modal>
  <label-modal v-if="labelModal" :store="store" :model="labelModal" @close="labelModal=null"></label-modal>
  <help-modal v-if="helpOpen" @close="helpOpen=false"></help-modal>
  <account-screen v-if="accountOpen" :store="store"
    @close="accountOpen=false" @saved="onAccountSaved" @logout="onLogout"></account-screen>
  <sort-modal v-if="sortOpen" :store="store" @close="sortOpen=false"></sort-modal>

  <!-- app-styled confirm (store.askConfirm) -->
  <div v-if="confirmState" class="overlay" @click.self="resolveConfirm(false)" style="z-index:10005;">
    <div class="modal" style="max-width:360px;">
      <div class="modal-body" style="text-align:center;line-height:1.6;">{{ confirmState.msg }}</div>
      <div class="modal-foot" style="justify-content:center;gap:10px;">
        <button class="btn" @click="resolveConfirm(false)">No ⎋</button>
        <button class="btn primary" @click="resolveConfirm(true)">Yes ↵</button>
      </div>
    </div>
  </div>

  <!-- app-styled prompt (store.askPrompt) -->
  <div v-if="promptState" class="overlay" @click.self="resolvePrompt(false)" style="z-index:10005;">
    <div class="modal" style="max-width:380px;">
      <div class="modal-head">{{ promptState.label }}</div>
      <div class="modal-body">
        <input ref="promptInput" class="input" v-model="promptState.value" spellcheck="false"
               @keydown.enter="resolvePrompt(true)" @keydown.esc="resolvePrompt(false)" />
      </div>
      <div class="modal-foot">
        <button class="btn" @click="resolvePrompt(false)">cancel</button>
        <button class="btn primary" @click="resolvePrompt(true)">ok ↵</button>
      </div>
    </div>
  </div>

  <!-- toasts -->
  <div class="toasts">
    <div v-for="t in store.toasts" :key="t.id" class="toast">{{ t.msg }}</div>
  </div>
</div>

<script src="js/vue.global.prod.js"></script>
<script src="js/recurrence.js"></script>
<script src="js/query.js"></script>
<script src="js/data.js"></script>
<script src="js/kbform.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/tasklist.js"></script>
<script src="js/recurrence-builder.js"></script>
<script src="js/task-detail.js"></script>
<script src="js/query-bar.js"></script>
<script src="js/command-palette.js"></script>
<script src="js/modals.js"></script>
<script src="js/help-modal.js"></script>
<script src="js/login-screen.js"></script>
<script src="js/account-screen.js"></script>
<script src="js/sort-modal.js"></script>
<script>
const { createApp } = Vue;
let stateVersion = 0;   // optimistic-concurrency version from the server

const app = createApp({
  data(){ return {
    store: window.store,
    paletteOpen: false,
    projectModal: null,
    saveModal: null,
    clock: '',
    selIndex: 0,
    helpOpen: false,
    accountOpen: false,
    sortOpen: false,
    labelModal: null,
    confirmState: null,   // { msg, resolve } for store.askConfirm
    promptState: null,    // { label, value, resolve } for store.askPrompt
    loaded: false,   // true once we've successfully loaded server state; gates writes
  }; },
  computed: {
    today(){ return new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'2-digit'}); },
    openCount(){ return this.store.tasks.filter(t=>!t.done).length; },
    overdueCount(){ return this.store.tasks.filter(t=>!t.done && this.isOverdue(t)).length; }
  },
  watch: {
    // the detail drawer is its own captured pane while open; restore the list when it closes
    'store.detailOpen'(v){
      if(v){ this.store.focusPane='detail'; }
      else if(this.store.focusPane==='detail'){ this.store.focusPane='list'; }
    }
  },
  methods: {
    isOverdue(t){ return t.due && Rec.daysBetween(Rec.startOfDay(new Date()), Rec.parseYMD(t.due))<0; },
    openPalette(){ this.paletteOpen=true; },
    newTask(){ this.$nextTick(()=>{ this.$refs.list && this.$refs.list.focusAdd(); }); },
    openProjectModal(mode, parentId, project){
      this.projectModal = { mode, parentId: parentId||null, project: project||null };
    },
    openSave(query){ this.saveModal = { mode:'new', query: query||'' }; },
    openViewEdit(sv){ this.saveModal = { mode:'edit', view: sv }; },
    openLabelEdit(l){ this.labelModal = { label: l }; },
    async deleteView(sv){
      if(await this.store.askConfirm('Delete view "'+sv.name+'"?')){
        if(this.store.view.kind==='query' && this.store.view.id===sv.id)
          this.store.setView({ kind:'query', id:'sv_today', title:'Today', query:'status:open due:today' });
        this.store.deleteQuery(sv);
      }
    },
    resolveConfirm(v){ if(this.confirmState){ const r=this.confirmState.resolve; this.confirmState=null; r(v); } },
    resolvePrompt(ok){
      if(!this.promptState) return;
      const r=this.promptState.resolve;
      const val = ok ? (this.promptState.value||'').trim() : '';
      this.promptState=null; r(val || null);
    },
    openAccount(){ this.accountOpen = true; },
    // ---- search ('/'): live free-text across all tasks ----
    openSearch(){ this.store.searchActive = true; this.$nextTick(()=>{ this.$refs.search && this.$refs.search.focus(); }); },
    commitSearch(){   // Enter: drop into the results list, cursor on the first match
      const rows = this.store.visibleRows();
      if(rows.length) this.store.selectedTaskId = rows[0].id;
      if(this.$refs.search) this.$refs.search.blur();
    },
    clearSearch(){   // Esc: forget the term and restore the underlying view
      this.store.searchActive = false; this.store.searchTerm = '';
      if(this.$refs.search) this.$refs.search.blur();
    },
    // ---- keyboard ----
    onKey(e){
      // app-styled confirm / prompt take priority over every other shortcut
      if(this.confirmState){
        // stop the same key from also reaching a modal's KbForm listener (both are on
        // document) — otherwise resolving here lets the modal re-fire its dirty-guard
        e.stopImmediatePropagation();
        if(e.key==='Enter'){ e.preventDefault(); this.resolveConfirm(true); }   // Yes — discard & close
        else if(e.key==='Escape'){ e.preventDefault(); this.resolveConfirm(false); }   // No — keep editing
        return;
      }
      if(this.promptState) return;   // the prompt input handles its own enter/esc
      // KbForm-driven modals are takeovers: each owns the keyboard while open
      if(this.accountOpen || this.sortOpen || this.projectModal || this.saveModal || this.labelModal || this.helpOpen) return;
      const tag=(e.target.tagName||'').toLowerCase();
      const typing = tag==='input'||tag==='textarea'||tag==='select'||e.target.isContentEditable;
      // ⌘K / Ctrl+K everywhere
      if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); this.paletteOpen=!this.paletteOpen; return; }
      // let browser combos (ctrl+f find, ctrl+l address bar, etc.) through; our
      // shortcuts are bare keys or shift-combos only
      if(e.ctrlKey||e.metaKey||e.altKey) return;
      if(e.key==='Escape'){
        if(this.paletteOpen){ this.paletteOpen=false; return; }
        // project/save/label modals own Esc themselves (KbForm dirty-guard)
        if(this.store.detailOpen){
          // inside the recurrence sub-pane, Esc pops out of it — not the whole drawer
          if(this.$refs.detail && this.$refs.detail.recurActive){ this.$refs.detail.kbKey(e); return; }
          const a=document.activeElement; if(a && a.blur) a.blur(); this.store.detailOpen=false; return;
        }
        // a task detail opened from search closes first (above); a second Esc clears the search
        if(this.store.searchActive){ e.preventDefault(); this.clearSearch(); return; }
      }
      // task-detail drawer: a captured pane. While open it owns nav-mode keys
      // (j/k fields · i edit · space toggle · enter save); J/K swap tasks; u/d
      // duplicate/delete. Typing in a field is left to the field's own handlers.
      if(this.store.focusPane==='detail'){
        if(typing) return;
        // while inside the recurrence sub-pane, the detail's own shortcuts (swap /
        // duplicate / delete) are suppressed — keys go to the builder instead
        const inRecur = this.$refs.detail && this.$refs.detail.recurActive;
        if(!inRecur){
          if(e.key==='J'){ e.preventDefault(); this.detailSwap(1); return; }
          if(e.key==='K'){ e.preventDefault(); this.detailSwap(-1); return; }
          if(e.key==='u'){ e.preventDefault(); this.$refs.detail && this.$refs.detail.duplicate(); return; }
          if(e.key==='d'){ e.preventDefault(); this.$refs.detail && this.$refs.detail.del(); return; }
        }
        if(this.$refs.detail) this.$refs.detail.kbKey(e);
        return;
      }
      // '?' opens the keyboard/syntax reference (shift+/ — handle before the bare
      // '/' query-focus shortcut below).
      if(e.key==='?' && !typing){ e.preventDefault(); this.helpOpen=true; return; }
      // '@' (shift+2) opens the account screen
      if(e.key==='@' && !typing){ e.preventDefault(); this.openAccount(); return; }
      // 'S' (shift+s) opens the sort-preferences popup
      if(e.key==='S' && !typing){ e.preventDefault(); this.sortOpen=true; return; }
      // '/' opens the bottom-bar search (free-text across all tasks)
      if(e.key==='/' && !typing){ e.preventDefault(); this.openSearch(); return; }
      if(typing || this.paletteOpen) return;

      // filter builder: F collapses the panel, f focuses into it (from any window)
      if(e.key==='F'){ e.preventDefault(); this.toggleBuilder(); return; }
      if(e.key==='f'){ e.preventDefault(); this.toggleFilterFocus(); return; }
      // n toggles the sidebar nav column (parallel to f/F for the filter)
      if(e.key==='n'){ e.preventDefault(); this.toggleNav(); return; }

      // each pane has its own navigation while focused
      if(this.store.focusPane==='side'){ this.sidebarKey(e); return; }
      if(this.store.focusPane==='filter'){ this.filterKey(e); return; }

      // j/k walk the flattened visible rows, so subtasks are reachable too
      const rows=this.store.visibleRows();
      const curId=this.store.selectedTaskId;
      let idx=rows.findIndex(t=>t.id===curId);
      switch(e.key){
        case 'j': case 'ArrowDown':
          e.preventDefault();
          idx = idx<0 ? 0 : Math.min(rows.length-1, idx+1);
          if(rows[idx]){ this.store.selectedTaskId=rows[idx].id; this.scrollSelIntoView(); } break;
        case 'k': case 'ArrowUp':
          e.preventDefault();
          idx = idx<0 ? 0 : Math.max(0, idx-1);
          if(rows[idx]){ this.store.selectedTaskId=rows[idx].id; this.scrollSelIntoView(); } break;
        case 'l': case 'ArrowRight': {
          e.preventDefault();
          const t=this.store.taskById(curId);
          if(!t) break;
          const subs=this.store.subtasks(t.id);
          if(subs.length){
            if(t.collapsed){ t.collapsed=false; }            // expand to reveal subtasks
            else { this.store.selectedTaskId=subs[0].id; this.scrollSelIntoView(); } // enter first subtask
          }
          break;
        }
        case 'h': case 'ArrowLeft': {
          e.preventDefault();
          const t=this.store.taskById(curId);
          if(t && t.parentId){ this.store.selectedTaskId=t.parentId; this.scrollSelIntoView(); break; } // up to parent
          if(t && !t.collapsed && this.store.subtasks(t.id).length){ t.collapsed=true; break; }         // collapse root
          this.enterSidebar(); break;                                                                   // leaf root → sidebar
        }
        case 'x': case ' ':
          if(curId){ e.preventDefault(); const t=this.store.taskById(curId); if(t) this.store.toggleDone(t); } break;
        case 'e': case 'Enter':
          if(curId){ e.preventDefault(); this.store.detailOpen=true; } break;
        case 'i':
          e.preventDefault(); this.newTask(); break;
        case 's':
          e.preventDefault(); this.$refs.list && this.$refs.list.cycleSort(); break;
        case '^':
          e.preventDefault(); this.$refs.list && this.$refs.list.toggleSortDir(); break;
        case 'c':
          this.store.showCompleted=!this.store.showCompleted; break;
        case '!':
          if(curId){ e.preventDefault(); const t=this.store.taskById(curId);
            if(t){ t.priority = ((t.priority||0)+1) % 6;   // cycle none→v.low→…→v.high→none
              this.store.toast('! priority → '+['none','v.low','low','med','high','v.high'][t.priority]); } } break;
      }
    },
    scrollSelIntoView(){
      this.$nextTick(()=>{ const el=document.querySelector('.list-wrap .task.sel'); if(el) el.scrollIntoView({block:'nearest'}); });
    },
    // J/K from the captured detail pane: swap to the prev/next visible task, keeping the drawer open
    detailSwap(dir){
      const rows=this.store.visibleRows();
      let idx=rows.findIndex(t=>t.id===this.store.selectedTaskId);
      if(idx<0) return;
      idx=Math.max(0, Math.min(rows.length-1, idx+dir));
      if(rows[idx]){ this.store.selectedTaskId=rows[idx].id; this.scrollSelIntoView(); }
    },
    // ---- sidebar keyboard navigation ----
    enterSidebar(){
      this.store.navCollapsed=false;   // h/← always reveals the nav before entering
      this.store.moveId=null;          // never enter the nav already in move mode
      const items=this.store.sideItems();
      if(!items.length) return;
      // start on the currently active view if we can find it, else first item
      let id=this.store.sideFocusId;
      if(!items.some(i=>i.id===id)){
        const v=this.store.view;
        const cur=items.find(i =>
          (v.kind==='project' && i.kind==='project' && i.id===v.id) ||
          (v.kind==='query'   && i.kind!=='project' && i.kind!=='head' && i.id===v.id));
        id=cur ? cur.id : (items.find(i=>i.kind!=='head') || items[0]).id;
      }
      this.store.sideFocusId=id;
      this.store.focusPane='side';
      this.store.sidebarOpen=true;        // reveal on mobile
      this.scrollSideIntoView();
    },
    exitSidebar(){ this.store.focusPane='list'; this.store.sidebarOpen=false; this.store.moveId=null; },
    // show/hide the whole sidebar nav column; if we hide it while focused there,
    // drop keyboard focus back to the task list
    toggleNav(){
      if(this.store.navCollapsed){
        // expanding: reveal and drop the cursor into the nav (like h/←)
        this.enterSidebar();
      } else {
        // collapsing: hide and, if we were navigating it, fall back to the list
        this.store.navCollapsed = true;
        this.store.sidebarOpen = false;
        if(this.store.focusPane==='side') this.exitSidebar();
      }
    },
    // ---- filter builder keyboard navigation ----
    enterFilter(){
      this.store.builderOpen=true;
      this.store.focusPane='filter';
      this.$nextTick(()=>{ const qb=this.$refs.qbar; if(qb){ qb.kbInit(); qb.kbFocusRow('status'); } });
    },
    exitFilter(){
      this.store.focusPane='list';
      if(!this.store.selectedTaskId){ const r=this.store.visibleRoots(); if(r.length) this.store.selectedTaskId=r[0].id; }
    },
    toggleFilterFocus(){ if(this.store.focusPane==='filter') this.exitFilter(); else this.enterFilter(); },
    toggleBuilder(){
      this.store.builderOpen=!this.store.builderOpen;
      if(!this.store.builderOpen && this.store.focusPane==='filter') this.exitFilter();
    },
    filterKey(e){
      const qb=this.$refs.qbar; if(!qb) return;
      switch(e.key){
        case 'i': e.preventDefault(); qb.focus(); return;        // into the raw query editor (from anywhere)
        case 's': e.preventDefault(); qb.save(); return;         // save as smart view
        case 'x': e.preventDefault(); qb.clearQuery(); return;   // clear the query
        case 'Escape': e.preventDefault(); this.exitFilter(); return;
        case 'Enter': e.preventDefault(); this.exitFilter(); return;  // apply & view results
      }
      // j/k between groups · h/l within a group · space toggles — handled by KbForm
      qb.kbKey(e);
    },
    sidebarKey(e){
      const items=this.store.sideItems();
      if(!items.length){ this.exitSidebar(); return; }
      let idx=items.findIndex(i=>i.id===this.store.sideFocusId);
      if(idx<0) idx=0;

      // move mode: j/k reorder the held item; m/enter/esc drop it
      if(this.store.moveId){
        const moved=items.find(i=>i.id===this.store.moveId);
        const reorder=(dir)=>{
          if(!moved) return;
          if(moved.kind==='query') this.store.moveView(moved.ref, dir);
          else if(moved.kind==='project') this.store.moveProject(moved.ref, dir);
          this.scrollSideIntoView();
        };
        switch(e.key){
          case 'j': case 'ArrowDown': e.preventDefault(); reorder(1); break;
          case 'k': case 'ArrowUp':   e.preventDefault(); reorder(-1); break;
          case 'm': case 'Enter': case 'Escape': e.preventDefault(); this.store.moveId=null; this.store.toast('✓ order saved'); break;
        }
        return;
      }

      switch(e.key){
        case 'j': case 'ArrowDown':
          e.preventDefault(); idx=Math.min(items.length-1, idx+1);
          this.store.sideFocusId=items[idx].id; this.scrollSideIntoView(); break;
        case 'k': case 'ArrowUp':
          e.preventDefault(); idx=Math.max(0, idx-1);
          this.store.sideFocusId=items[idx].id; this.scrollSideIntoView(); break;
        case 'Enter': case ' ': {
          e.preventDefault();
          const it=items[idx];
          if(it && it.kind==='head') this.toggleSection(it.section);   // expand/collapse on a header
          else { this.store.openSideItem(it); this.exitSidebar(); }
          break;
        }
        case 'l': case 'ArrowRight': {
          e.preventDefault();
          const it=items[idx];
          if(it && it.kind==='head'){ if(this.store.navSections[it.section]) this.toggleSection(it.section); break; }  // l expands a collapsed section
          if(it && it.kind==='project' && it.ref.collapsed && this.store.childProjects(it.ref.id).length){ it.ref.collapsed=false; break; }  // expand a collapsed parent
          this.store.openSideItem(it); this.exitSidebar(); break;
        }
        case 'e': {
          e.preventDefault();
          const it=items[idx];
          if(it.kind==='project') this.openProjectModal('edit', null, it.ref);
          else if(it.kind==='query') this.openViewEdit(it.ref);
          else if(it.kind==='label') this.openLabelEdit(it.ref);
          break;
        }
        case 'x': {   // delete the focused view
          e.preventDefault();
          const it=items[idx];
          if(it.kind==='query') this.deleteView(it.ref);
          break;
        }
        case 'a': {   // add a sub-project under the focused project
          e.preventDefault();
          const it=items[idx];
          if(it.kind==='project') this.openProjectModal('new', it.ref.id);
          break;
        }
        case 'A':     // add a top-level project
          e.preventDefault(); this.openProjectModal('new', null); break;
        case 'm': {   // enter move mode on the focused view / project
          e.preventDefault();
          const it=items[idx];
          if(it && (it.kind==='query' || it.kind==='project')){
            this.store.sideFocusId=it.id; this.store.moveId=it.id;
            this.store.toast('↕ move mode · j/k reorder · esc to drop');
          }
          break;
        }
        case 'Tab': {  // collapse / expand the focused item's section
          e.preventDefault();
          const it=items[idx];
          if(it) this.toggleSection(it.kind==='head' ? it.section : it.kind);
          break;
        }
        case 'h': case 'ArrowLeft': {
          // walk up / collapse the tree — never leaves the nav (use esc for that)
          e.preventDefault();
          const it=items[idx];
          if(!it) break;
          if(it.kind==='head'){ this.toggleSection(it.section); break; }   // toggle the section (like Tab)
          if(it.kind==='project'){
            if(!it.ref.collapsed && this.store.childProjects(it.ref.id).length){ it.ref.collapsed=true; this.scrollSideIntoView(); break; }  // collapse expanded parent (stay on it)
            this.store.sideFocusId = it.ref.parentId || 'head_project';   // up: parent project, else the projects header
            this.scrollSideIntoView(); break;
          }
          this.store.sideFocusId = (it.kind==='label') ? 'head_label' : 'head_query';   // view/label → its section header
          this.scrollSideIntoView(); break;
        }
        case 'Escape':
          e.preventDefault(); this.exitSidebar(); break;
      }
    },
    // toggle a section's collapse and park the cursor on its (always-present) header,
    // so a collapsed section stays reachable and can be re-expanded with Tab
    toggleSection(section){
      this.store.navSections[section] = !this.store.navSections[section];
      this.store.sideFocusId = 'head_'+section;
      this.scrollSideIntoView();
    },
    scrollSideIntoView(){
      this.$nextTick(()=>{ const el=document.querySelector('.sidebar .kfocus'); if(el) el.scrollIntoView({block:'nearest'}); });
    },
    // ---- persistence (snapshot store over /api/state) ----
    // Replace the store's arrays in-place (keeps Vue reactivity refs intact).
    // _suppress stops the resulting change from scheduling a redundant PUT.
    applyState(s){
      this._suppress = true;
      if(s.projects){ this.store.projects.splice(0, this.store.projects.length, ...s.projects); }
      if(s.tasks){ this.store.tasks.splice(0, this.store.tasks.length, ...s.tasks); }
      if(s.labels){ this.store.labels.splice(0, this.store.labels.length, ...s.labels); }
      if(s.savedQueries){ this.store.savedQueries.splice(0, this.store.savedQueries.length, ...s.savedQueries); }
      // raise the id counter past every id we just loaded, so newly-created
      // tasks/projects can't reuse an existing id (the t_101 collision bug).
      this.store.reserveIds();
      this.$nextTick(()=>{ this._suppress = false; });
    },
    snapshot(){
      // `version` travels in the body so the optimistic-concurrency check works
      // even through proxies that strip the conditional If-Match header.
      return {
        version: stateVersion,
        projects: JSON.parse(JSON.stringify(this.store.projects)),
        tasks: JSON.parse(JSON.stringify(this.store.tasks)),
        labels: JSON.parse(JSON.stringify(this.store.labels)),
        savedQueries: JSON.parse(JSON.stringify(this.store.savedQueries)),
      };
    },
    async persist(){
      // Never write before a successful load: a failed hydrate leaves the store
      // holding sample/stale data, and pushing that would clobber the server.
      if(!this.loaded) return;
      try{
        const res = await fetch('/api/state', {
          method:'PUT',
          credentials:'include',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify(this.snapshot()),
        });
        if(res.status===401){ this.handleAuthExpired(); return; }
        if(res.status===409){
          // another device wrote first — take server state, drop our unsaved edits
          const server = await res.json();
          stateVersion = server.version || 0;
          this.applyState(server);
          this.store.toast('↻ synced from another device');
          return;
        }
        if(res.ok){ const j = await res.json(); stateVersion = j.version; }
        else { this.store.toast('save failed ('+res.status+')'); }
      }catch(e){ this.store.toast('offline — change not saved'); }
    },
    async hydrate(){
      try{
        const res = await fetch('/api/state', { credentials:'include' });
        if(res.status===401){ this.handleAuthExpired(); return; }
        if(res.ok){
          const s = await res.json();
          stateVersion = s.version || 0;
          this.applyState(s);
          this.loaded = true;   // writes are now allowed
          // default to the top sidebar view (view isn't persisted) — honors the
          // user's saved-query order rather than always landing on "Today"
          const top = this.store.savedQueries[0];
          if(top) this.store.openQueryView(top);
          return;
        }
        this.store.toast('load failed ('+res.status+') — read only');
      }catch(e){
        this.store.toast('offline — could not load (read only)');
      }
      // loaded stays false: the app shows whatever is in memory but won't save
      // until a reload succeeds, so it can't overwrite good server state.
    },
    // ---- auth / session lifecycle ----
    async checkSession(){
      try{
        const res = await fetch('/api/auth/me', { credentials:'include' });
        if(res.ok){ this.store.currentUser = await res.json(); window.applyTheme(this.store.currentUser.theme); this.store.applySortPrefs(this.store.currentUser.sort_prefs); await this.startSession(); }
        else { this.store.currentUser = null; }
      }catch(e){
        this.store.currentUser = null;
        this.store.toast('offline — could not reach the server');
      }
    },
    async onAuthed(user){ this.store.currentUser = user; window.applyTheme(user.theme); this.store.applySortPrefs(user.sort_prefs); await this.startSession(); },
    // Attach the keyboard + change-watcher (once) and load this user's state.
    async startSession(){
      if(!this._keysAttached){ document.addEventListener('keydown', this.onKey); this._keysAttached = true; }
      if(!this._watchAttached){
        this.$watch(()=>JSON.stringify([this.store.tasks,this.store.projects,this.store.labels,this.store.savedQueries]),
          ()=>{ if(this._suppress) return; clearTimeout(this._save); this._save=setTimeout(this.persist,300); });
        this._watchAttached = true;
      }
      await this.hydrate();
    },
    clearLocalState(){
      this.store.tasks.splice(0); this.store.projects.splice(0);
      this.store.labels.splice(0); this.store.savedQueries.splice(0);
    },
    onAccountSaved(user){ this.store.currentUser = user; window.applyTheme(user.theme); this.store.applySortPrefs(user.sort_prefs); },
    async onLogout(){
      this.loaded = false;
      this.accountOpen = false;
      if(this._keysAttached){ document.removeEventListener('keydown', this.onKey); this._keysAttached = false; }
      this.clearLocalState();
      this.store.currentUser = null;     // flips back to the login screen
      window.applyTheme('amber');        // login screen uses the default theme
    },
    // 401 mid-session (expired / revoked): drop to the login screen.
    handleAuthExpired(){
      if(!this.store.currentUser && !this.loaded) return;
      this.loaded = false;
      this.accountOpen = false;
      if(this._keysAttached){ document.removeEventListener('keydown', this.onKey); this._keysAttached = false; }
      this.clearLocalState();
      this.store.currentUser = null;
      window.applyTheme('amber');
      this.store.toast('session expired — please sign in');
    }
  },
  async mounted(){
    const tick=()=>{ this.clock=new Date().toLocaleTimeString('en-GB',{hour12:false}); };
    tick(); this._timer=setInterval(tick,1000);
    // flush a pending save when the page is hidden/closed (e.g. completing a
    // recurring task then immediately closing — don't lose the spawned occurrence)
    this._flush=()=>{ if(this._save){ clearTimeout(this._save); this._save=null; this.persist(); } };
    // explicit "save now" (e.g. the detail drawer's Save button): cancel the
    // debounce and persist immediately.
    this.store.saveNow=()=>{ if(this._save){ clearTimeout(this._save); this._save=null; } this.persist(); };
    // app-styled confirm / prompt (Promise-based) usable from any component
    this.store.askConfirm=(msg)=> new Promise((res)=>{ this.confirmState={ msg, resolve:res }; });
    this.store.askPrompt=(label, value='')=> new Promise((res)=>{
      this.promptState={ label, value, resolve:res };
      this.$nextTick(()=>{ const el=this.$refs.promptInput; if(el){ el.focus(); el.select(); } });
    });
    window.addEventListener('pagehide', this._flush);
    this._onVis=()=>{ if(document.visibilityState==='hidden') this._flush(); };
    document.addEventListener('visibilitychange', this._onVis);
    // Tear down any service worker left over from the notification-era build so
    // it can't serve a stale cached shell.
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations()
        .then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});
    }
    // Decide login vs app: /api/auth/me. On success startSession() attaches the
    // keyboard + watcher and hydrates; otherwise the login screen shows and the
    // global keydown stays detached (app shortcuts off on login).
    await this.checkSession();
  },
  beforeUnmount(){
    document.removeEventListener('keydown', this.onKey);
    clearInterval(this._timer);
    window.removeEventListener('pagehide', this._flush);
    document.removeEventListener('visibilitychange', this._onVis);
  }
});

app.component('app-sidebar', window.AppSidebar);
app.component('tree-row', window.TreeRow);
app.component('task-list', window.TaskList);
app.component('task-row', window.TaskRow);
app.component('recurrence-builder', window.RecurrenceBuilder);
app.component('task-detail', window.TaskDetail);
app.component('query-bar', window.QueryBar);
app.component('command-palette', window.CommandPalette);
app.component('project-modal', window.ProjectModal);
app.component('save-query-modal', window.SaveQueryModal);
app.component('label-modal', window.LabelModal);
app.component('help-modal', window.HelpModal);
app.component('login-screen', window.LoginScreen);
app.component('account-screen', window.AccountScreen);
app.component('sort-modal', window.SortModal);
app.mount('#app');
</script>
</body>
</html>
